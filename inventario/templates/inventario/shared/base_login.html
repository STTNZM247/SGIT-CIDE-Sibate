{% load static %}
<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Inventario SENA - Sibate{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'inventario/img/Logo SENA.svg' %}?v=2">
    <link rel="shortcut icon" href="{% static 'inventario/img/Logo SENA.svg' %}?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'inventario/shared/css/base.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    <footer class="app-footer">
        <div class="app-footer-inner">
            <small>{% block footer_text %}Servicio Nacional de Aprendizaje (SENA){% endblock %}</small>
        </div>
    </footer>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
